<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>Tournament Pairing</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0d10;
      --surface: #13151c;
      --border:  #1f2130;
      --exp:     #4d9fff;
      --inexp:   #2ee8a0;
      --muted:   #3a3f52;
      --text:    #dce3f0;
      --dim:     #5a6178;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      min-height: 100vh;
      padding: 16px 14px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    header p {
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 10px;
    }

    .panel-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .panel-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .panel-label.exp   { color: var(--exp); }
    .panel-label.inexp { color: var(--inexp); }

    .panel-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--dim);
    }

    .input-row {
      display: flex;
      gap: 5px;
      margin-bottom: 8px;
    }

    input[type="text"] {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 7px 8px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #4f6ef7; }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn-add {
      background: #1f2a4a;
      color: var(--exp);
      border: 1px solid #2a3d6a;
      border-radius: 5px;
      padding: 0 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-add:active { background: #263660; }

    .name-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 160px;
      overflow-y: auto;
    }

    .name-list::-webkit-scrollbar { width: 3px; }
    .name-list::-webkit-scrollbar-track { background: transparent; }
    .name-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .name-tag {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border-radius: 4px;
      padding: 5px 7px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 0 0 6px;
      flex-shrink: 0;
    }

    .btn-remove:active { color: #ef4444; }

    .list-empty {
      font-size: 0.65rem;
      color: var(--dim);
      text-align: center;
      padding: 10px 0;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .btn-generate {
      width: 100%;
      padding: 14px;
      background: var(--surface);
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: not-allowed;
      margin-bottom: 6px;
      transition: all 0.15s;
    }

    .btn-generate.active {
      background: linear-gradient(120deg, #1a2e5c 0%, #1e1040 100%);
      border-color: #2a4080;
      color: var(--text);
      cursor: pointer;
    }

    .btn-generate.active:active { opacity: 0.75; }

    .btn-generate.done {
      background: var(--surface);
      border-color: var(--border);
      color: var(--dim);
      cursor: not-allowed;
    }

    .post-note {
      font-size: 0.6rem;
      color: var(--dim);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: none;
    }

    #results { display: none; }
    #results.show { display: block; }

    .section-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--dim);
      margin-bottom: 8px;
    }

    /* Team cards (stacked members, not versus) */
    .team-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 7px;
      display: flex;
      align-items: stretch;
      gap: 10px;
    }

    .team-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--dim);
      min-width: 18px;
      padding-top: 2px;
    }

    .team-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .team-member {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .member-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .member-dot.exp   { background: var(--exp); }
    .member-dot.inexp { background: var(--inexp); }

    .member-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      word-break: break-word;
    }

    .member-name.exp   { color: var(--exp); }
    .member-name.inexp { color: var(--inexp); }

    .team-hr {
      border: none;
      border-top: 1px solid var(--border);
    }

    .unpaired-block { margin-top: 16px; }

    .unpaired-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 7px;
    }

    .unpaired-label.exp   { color: var(--exp); }
    .unpaired-label.inexp { color: var(--inexp); }

    .unpaired-tag {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      padding: 5px 10px;
      border-radius: 4px;
      margin: 0 4px 4px 0;
    }

    .unpaired-tag.exp {
      background: #0d1e35;
      color: var(--exp);
      border: 1px solid #1a3a6a;
    }

    .unpaired-tag.inexp {
      background: #0a2420;
      color: var(--inexp);
      border: 1px solid #12483a;
    }

    .btn-back {
      width: 100%;
      margin-top: 20px;
      padding: 11px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-back:active { background: var(--surface); }

    .btn-challonge {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: linear-gradient(120deg, #1a3a20 0%, #112a1a 100%);
      color: var(--inexp);
      border: 1px solid #1e4a28;
      border-radius: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-challonge:active { opacity: 0.75; }

    /* Export modal - bottom sheet */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
    }

    .modal-backdrop.open { display: flex; align-items: flex-end; }

    .modal-sheet {
      width: 100%;
      background: #161820;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 14px 14px 0 0;
      padding: 20px 16px 32px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto -4px;
    }

    .modal-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--inexp);
    }

    .modal-hint {
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .export-textarea {
      flex: 1;
      min-height: 180px;
      max-height: 340px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      line-height: 1.7;
      resize: none;
      outline: none;
      overflow-y: auto;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
    }

    .btn-copy {
      flex: 1;
      padding: 12px;
      background: linear-gradient(120deg, #1a3a20 0%, #112a1a 100%);
      color: var(--inexp);
      border: 1px solid #1e4a28;
      border-radius: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-copy:active { opacity: 0.75; }
    .btn-copy.copied { background: #122a14; color: #22c55e; border-color: #166534; }

    .btn-close-modal {
      padding: 12px 16px;
      background: transparent;
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-close-modal:active { background: var(--surface); }

    .btn-export {
      width: 100%;
      margin-top: 10px;
      padding: 11px;
      background: #1a2e1a;
      color: var(--inexp);
      border: 1px solid #1f4a2a;
      border-radius: 7px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-export:active { background: #223d22; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      padding: 0;
    }

    .modal-box {
      background: #16181f;
      border: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      padding: 20px 16px 32px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--inexp);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }

    .modal-close:active { color: var(--text); }

    .modal-hint {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.05em;
      line-height: 1.5;
    }

    .modal-textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      line-height: 1.7;
      resize: none;
      min-height: 180px;
      max-height: 40vh;
      outline: none;
    }

    #save-dot {
      position: fixed;
      top: 12px;
      right: 14px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--inexp);
      opacity: 0;
      transition: opacity 0.3s;
    }

    #save-dot.flash { opacity: 1; }
  </style>
</head>
<body>

<div id="save-dot"></div>

<header>
  <h1>Tournament Pairing</h1>
  <p>Team assignment</p>
</header>

<div class="panels">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label exp">Experienced</span>
      <span class="panel-count" id="exp-count">0</span>
    </div>
    <div class="input-row">
      <input type="text" id="exp-input" placeholder="Name..." maxlength="40" autocomplete="off" autocorrect="off">
      <button class="btn-add" onclick="addPlayer('exp')">Add</button>
    </div>
    <div class="name-list" id="exp-list">
      <div class="list-empty">Empty</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-label inexp">Inexperienced</span>
      <span class="panel-count" id="inexp-count">0</span>
    </div>
    <div class="input-row">
      <input type="text" id="inexp-input" placeholder="Name..." maxlength="40" autocomplete="off" autocorrect="off">
      <button class="btn-add" onclick="addPlayer('inexp')">Add</button>
    </div>
    <div class="name-list" id="inexp-list">
      <div class="list-empty">Empty</div>
    </div>
  </div>
</div>

<button class="btn-generate" id="btn-generate" onclick="generatePairs()">Generate Teams</button>

<p class="post-note" id="post-note">Teams locked - new players go to unpaired list</p>

<div id="results">
  <div class="section-label">Teams</div>
  <div id="pairs-list"></div>

  <div id="unpaired-exp-block" class="unpaired-block" style="display:none;">
    <div class="unpaired-label exp">Unpaired - Experienced</div>
    <div id="unpaired-exp-tags"></div>
  </div>

  <div id="unpaired-inexp-block" class="unpaired-block" style="display:none;">
    <div class="unpaired-label inexp">Unpaired - Inexperienced</div>
    <div id="unpaired-inexp-tags"></div>
  </div>

<button class="btn-challonge" onclick="showExport()">Export for Challonge</button>
<button class="btn-back" onclick="backToMenu()">Edit Lists</button>

</div>

<!-- Challonge export modal -->

<div class="modal-backdrop" id="export-modal" onclick="handleBackdropClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Challonge Export</span>
      <span class="modal-hint">One team per line</span>
    </div>
    <textarea class="export-textarea" id="export-text" readonly spellcheck="false"></textarea>
    <div class="modal-actions">
      <button class="btn-copy" id="btn-copy" onclick="copyExport()">Copy All</button>
      <button class="btn-close-modal" onclick="hideExport()">Close</button>
    </div>
  </div>
</div>

<script>
  // Master list model.
  // state.exp and state.inexp always hold every player ever added.
  // state.pairs references players by id only.
  // Unpaired players = those whose id does not appear in any pair.
  const state = {
    exp:       [],
    inexp:     [],
    pairs:     [],   // [{ expId, inexpId }]
    hasPaired: false,
    uid:       0
  };

  // ---- persistence ----

  async function saveState() {
    try {
      await window.storage.set('tp_v2', JSON.stringify(state));
      flashDot();
    } catch(e) {}
  }

  async function loadState() {
    try {
      const r = await window.storage.get('tp_v2');
      if (r && r.value) Object.assign(state, JSON.parse(r.value));
    } catch(e) {}
  }

  function flashDot() {
    const dot = document.getElementById('save-dot');
    dot.classList.add('flash');
    clearTimeout(dot._t);
    dot._t = setTimeout(() => dot.classList.remove('flash'), 900);
  }

  // ---- helpers ----

  function nextId()   { return state.uid++; }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function unpairedExp() {
    const used = new Set(state.pairs.map(p => p.expId));
    return state.exp.filter(p => !used.has(p.id));
  }

  function unpairedInexp() {
    const used = new Set(state.pairs.map(p => p.inexpId));
    return state.inexp.filter(p => !used.has(p.id));
  }

  // ---- actions ----

  function addPlayer(type) {
    const input = document.getElementById(type + '-input');
    const name  = input.value.trim();
    if (!name) return;
    state[type].push({ id: nextId(), name });
    input.value = '';
    input.focus();
    saveState();
    render();
  }

  function removePlayer(type, id) {
    state[type] = state[type].filter(p => p.id !== id);
    saveState();
    render();
  }

  function generatePairs() {
    if (!state.exp.length || !state.inexp.length || state.hasPaired) return;
    const sExp   = shuffle(state.exp);
    const sInexp = shuffle(state.inexp);
    const count  = Math.min(sExp.length, sInexp.length);
    state.pairs     = Array.from({ length: count }, (_, i) => ({ expId: sExp[i].id, inexpId: sInexp[i].id }));
    state.hasPaired = true;
    saveState();
    render();
  }

  // Clears pairs only. Every player stays in their list and becomes editable again.
  function backToMenu() {
    state.pairs     = [];
    state.hasPaired = false;
    saveState();
    render();
  }

  // ---- render ----

  function render() {
    renderPanel('exp');
    renderPanel('inexp');
    renderGenBtn();
    renderResults();
  }

  function renderPanel(type) {
    const players = state[type];
    document.getElementById(type + '-count').textContent = players.length;
    const list = document.getElementById(type + '-list');

    if (!players.length) {
      list.innerHTML = '<div class="list-empty">Empty</div>';
      return;
    }

    list.innerHTML = players.map(p => `
      <div class="name-tag">
        <span>${esc(p.name)}</span>
        ${!state.hasPaired
          ? `<button class="btn-remove" onclick="removePlayer('${type}', ${p.id})">×</button>`
          : ''}
      </div>
    `).join('');
  }

  function renderGenBtn() {
    const btn  = document.getElementById('btn-generate');
    const note = document.getElementById('post-note');

    if (state.hasPaired) {
      btn.className   = 'btn-generate done';
      btn.textContent = 'Teams Generated';
      note.style.display = 'block';
    } else {
      const ready     = state.exp.length > 0 && state.inexp.length > 0;
      btn.className   = ready ? 'btn-generate active' : 'btn-generate';
      btn.textContent = 'Generate Teams';
      note.style.display = 'none';
    }
  }

  function renderResults() {
    const results = document.getElementById('results');
    if (!state.hasPaired) { results.classList.remove('show'); return; }
    results.classList.add('show');

    const expById   = Object.fromEntries(state.exp.map(p => [p.id, p]));
    const inexpById = Object.fromEntries(state.inexp.map(p => [p.id, p]));

    document.getElementById('pairs-list').innerHTML = state.pairs.length
      ? state.pairs.map((pair, i) => {
          const e = expById[pair.expId];
          const n = inexpById[pair.inexpId];
          if (!e || !n) return '';
          return `
            <div class="team-card">
              <span class="team-num">${String(i + 1).padStart(2, '0')}</span>
              <div class="team-body">
                <div class="team-member">
                  <span class="member-dot exp"></span>
                  <span class="member-name exp">${esc(e.name)}</span>
                </div>
                <hr class="team-hr">
                <div class="team-member">
                  <span class="member-dot inexp"></span>
                  <span class="member-name inexp">${esc(n.name)}</span>
                </div>
              </div>
            </div>`;
        }).join('')
      : '<div class="list-empty">No teams</div>';

    const uExp      = unpairedExp();
    const uExpBlock = document.getElementById('unpaired-exp-block');
    if (uExp.length) {
      uExpBlock.style.display = 'block';
      document.getElementById('unpaired-exp-tags').innerHTML =
        uExp.map(p => `<span class="unpaired-tag exp">${esc(p.name)}</span>`).join('');
    } else {
      uExpBlock.style.display = 'none';
    }

    const uInexp      = unpairedInexp();
    const uInexpBlock = document.getElementById('unpaired-inexp-block');
    if (uInexp.length) {
      uInexpBlock.style.display = 'block';
      document.getElementById('unpaired-inexp-tags').innerHTML =
        uInexp.map(p => `<span class="unpaired-tag inexp">${esc(p.name)}</span>`).join('');
    } else {
      uInexpBlock.style.display = 'none';
    }
  }

  // ---- Challonge export ----

  function buildExportText() {
    const expById   = Object.fromEntries(state.exp.map(p => [p.id, p]));
    const inexpById = Object.fromEntries(state.inexp.map(p => [p.id, p]));

    const lines = [];

    state.pairs.forEach(pair => {
      const e = expById[pair.expId];
      const n = inexpById[pair.inexpId];
      if (e && n) lines.push(`${e.name} & ${n.name}`);
    });

    const uExp   = unpairedExp();
    const uInexp = unpairedInexp();

    if (uExp.length || uInexp.length) {
      if (lines.length) lines.push('');
      uExp.forEach(p   => lines.push(`${p.name} & N/A`));
      uInexp.forEach(p => lines.push(`N/A & ${p.name}`));
    }

    return lines.join('\n');
  }

  function showExport() {
    document.getElementById('export-text').value = buildExportText();
    document.getElementById('export-modal').classList.add('open');
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'Copy All';
    btn.classList.remove('copied');
  }

  function hideExport() {
    document.getElementById('export-modal').classList.remove('open');
  }

  function handleBackdropClick(e) {
    if (e.target === document.getElementById('export-modal')) hideExport();
  }

  function copyExport() {
    const text = document.getElementById('export-text').value;
    const btn  = document.getElementById('btn-copy');
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy All';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      // Fallback for clipboard API failures
      const ta = document.getElementById('export-text');
      ta.select();
      document.execCommand('copy');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy All';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  document.getElementById('exp-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer('exp');
  });
  document.getElementById('inexp-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer('inexp');
  });

  (async () => { await loadState(); render(); })();
</script>

</body>
</html>
