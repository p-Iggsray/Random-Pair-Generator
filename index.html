<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0d10">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>Smash Pairing</title>
  <meta name="apple-mobile-web-app-title" content="Smash Pairing">
  <meta name="application-name" content="Smash Pairing">
  <link rel="apple-touch-icon" href="icon.svg?v=3">
  <link rel="icon" type="image/svg+xml" href="icon.svg?v=3">
  <link rel="manifest" href="manifest.webmanifest?v=3">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=15">
  <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>

<div id="save-dot"></div>

<header>
  <h1>Smash Pairing</h1>
  <p>Team assignment</p>
</header>

<div id="home">

<div class="home-actions">
  <button class="btn-presets" onclick="openPresets()">
    <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" aria-hidden="true">
      <path d="M4 1.5h8a1.5 1.5 0 0 1 1.5 1.5v11.5l-5.5-3-5.5 3V3A1.5 1.5 0 0 1 4 1.5z"/>
    </svg>
    Presets
  </button>
</div>

<div class="panels">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label exp">Experienced</span>
      <div class="panel-header-right">
        <span class="panel-count" id="exp-count">0</span>
        <button class="btn-bulk" aria-label="Bulk add experienced" onclick="openBulkAdd('exp')">
          <svg viewBox="0 0 14 14" width="13" height="13" fill="currentColor" aria-hidden="true">
            <rect x="0" y="1" width="14" height="2" rx="1"/>
            <rect x="0" y="6" width="14" height="2" rx="1"/>
            <rect x="0" y="11" width="14" height="2" rx="1"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="input-row">
      <input type="text" id="exp-input" placeholder="Name" maxlength="40" autocomplete="off" autocorrect="off">
      <button class="btn-add" aria-label="Add experienced" onclick="addPlayer('exp')">+</button>
    </div>
    <div class="name-list" id="exp-list">
      <div class="list-empty">Empty</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-label inexp">Inexperienced</span>
      <div class="panel-header-right">
        <span class="panel-count" id="inexp-count">0</span>
        <button class="btn-bulk" aria-label="Bulk add inexperienced" onclick="openBulkAdd('inexp')">
          <svg viewBox="0 0 14 14" width="13" height="13" fill="currentColor" aria-hidden="true">
            <rect x="0" y="1" width="14" height="2" rx="1"/>
            <rect x="0" y="6" width="14" height="2" rx="1"/>
            <rect x="0" y="11" width="14" height="2" rx="1"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="input-row">
      <input type="text" id="inexp-input" placeholder="Name" maxlength="40" autocomplete="off" autocorrect="off">
      <button class="btn-add" aria-label="Add inexperienced" onclick="addPlayer('inexp')">+</button>
    </div>
    <div class="name-list" id="inexp-list">
      <div class="list-empty">Empty</div>
    </div>
  </div>
</div>

<div class="panel set-teams-panel">
  <div class="panel-header">
    <span class="panel-label set">Set Teams</span>
    <span class="panel-count" id="fixed-count">0</span>
  </div>
  <div class="input-row fp-add">
    <input type="text" id="fp-a" placeholder="Player A" maxlength="40" autocomplete="off" autocorrect="off"
           onkeydown="if(event.key==='Enter'){event.preventDefault();addFixedPair();}">
    <span class="fp-amp">&amp;</span>
    <input type="text" id="fp-b" placeholder="Player B" maxlength="40" autocomplete="off" autocorrect="off"
           onkeydown="if(event.key==='Enter'){event.preventDefault();addFixedPair();}">
    <button class="btn-add set" aria-label="Add set pair" onclick="addFixedPair()">+</button>
  </div>
  <div class="name-list" id="fixed-list">
    <div class="list-empty">Empty</div>
  </div>
</div>

<button class="btn-generate" id="btn-generate" onclick="generatePairs()">Generate Teams</button>

</div>

<div id="results">
  <div class="section-label">Teams</div>
  <div class="swap-hint" id="swap-hint"></div>
  <div id="pairs-list"></div>

  <div id="unpaired-exp-block" class="unpaired-block" style="display:none;">
    <div class="unpaired-label exp">Unpaired - Experienced</div>
    <div id="unpaired-exp-tags"></div>
  </div>

  <div id="unpaired-inexp-block" class="unpaired-block" style="display:none;">
    <div class="unpaired-label inexp">Unpaired - Inexperienced</div>
    <div id="unpaired-inexp-tags"></div>
  </div>

<div class="results-add">
  <div class="section-label">Add Player</div>
  <div class="input-row exp">
    <input type="text" id="exp-input-r" placeholder="Experienced name" maxlength="40" autocomplete="off" autocorrect="off">
    <button class="btn-add exp" aria-label="Add experienced" onclick="addPlayer('exp', 'exp-input-r')">+</button>
  </div>
  <div class="input-row inexp">
    <input type="text" id="inexp-input-r" placeholder="Inexperienced name" maxlength="40" autocomplete="off" autocorrect="off">
    <button class="btn-add inexp" aria-label="Add inexperienced" onclick="addPlayer('inexp', 'inexp-input-r')">+</button>
  </div>
</div>

<button class="btn-pair-unpaired" id="btn-pair-unpaired" onclick="pairUnpaired()" style="display:none;">Pair Waiting</button>

<button class="btn-challonge" onclick="showExport()">Export for Challonge</button>
<button class="btn-back" id="btn-back" onclick="resetTeams()">Reset Teams</button>

</div>

<!-- Roster presets modal -->

<div class="modal-backdrop" id="presets-modal" onclick="handlePresetsBackdropClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Roster Presets</span>
      <span class="modal-hint">Tap Load to use a preset</span>
    </div>
    <div class="preset-list" id="preset-list"></div>
    <div class="preset-save-row">
      <input type="text" id="preset-save-name" placeholder="Save current roster as..." maxlength="40" autocomplete="off" autocorrect="off">
      <button class="btn-preset-save" id="btn-preset-save" onclick="saveCurrentAsPreset()">Save</button>
    </div>
    <div class="modal-actions">
      <button class="btn-close-modal" onclick="hidePresets()">Done</button>
    </div>
  </div>
</div>

<!-- Bulk add modal -->

<div class="modal-backdrop" id="bulk-modal" onclick="handleBulkBackdropClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="bulk-title">Bulk Add</span>
      <span class="modal-hint">One name per line</span>
    </div>
    <textarea class="bulk-textarea" id="bulk-text" placeholder="Parker&#10;Aidan&#10;Quinn" spellcheck="false" autocomplete="off" autocorrect="off" oninput="updateBulkCount()"></textarea>
    <div class="modal-actions">
      <button class="btn-bulk-add" id="btn-bulk-add" onclick="addBulkPlayers()" disabled>Add 0 Players</button>
      <button class="btn-close-modal" onclick="hideBulkAdd()">Cancel</button>
    </div>
  </div>
</div>

<!-- Challonge export modal -->

<div class="modal-backdrop" id="export-modal" onclick="handleBackdropClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Challonge Export</span>
      <span class="modal-hint">One team per line</span>
    </div>
    <textarea class="export-textarea" id="export-text" readonly spellcheck="false"></textarea>
    <div class="modal-actions">
      <button class="btn-copy" id="btn-copy" onclick="copyExport()">Copy All</button>
      <button class="btn-close-modal" onclick="hideExport()">Close</button>
    </div>
  </div>
</div>

<script src="app.js?v=15"></script>

</body>
</html>
