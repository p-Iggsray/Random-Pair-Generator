<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-label="READY? GO!">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a14"/>
      <stop offset="100%" stop-color="#0c0d10"/>
    </radialGradient>
    <linearGradient id="glowline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8442e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e8442e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e8442e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffc94d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffc94d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffc94d" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="240" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#glowline)"/>
  <rect x="0" y="237" width="800" height="3" fill="url(#glowline)"/>
  <rect x="0" y="118" width="800" height="1" fill="url(#goldline)" opacity="0.6"/>

  <text x="400" y="162"
        font-family="Impact, 'Arial Narrow', Haettenschweiler, 'Oswald', sans-serif"
        font-weight="900"
        font-size="118"
        text-anchor="middle"
        fill="#ffc94d"
        letter-spacing="5"
        opacity="0">READY?<animate attributeName="opacity" values="0;1;0.4;1;0.4;1;0;0" keyTimes="0;0.07;0.17;0.27;0.4;0.55;0.65;1" dur="3.5s" repeatCount="indefinite"/></text>

  <text x="400" y="178"
        font-family="Impact, 'Arial Narrow', Haettenschweiler, 'Oswald', sans-serif"
        font-weight="900"
        font-size="172"
        text-anchor="middle"
        fill="#e8442e"
        letter-spacing="10"
        opacity="0">GO!<animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.65;0.71;0.89;0.95;1" dur="3.5s" repeatCount="indefinite"/></text>
</svg>
