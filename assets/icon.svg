<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Smash Pairing">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="90%">
      <stop offset="0%"   stop-color="#e8442e"/>
      <stop offset="55%"  stop-color="#a01818"/>
      <stop offset="100%" stop-color="#3a0606"/>
    </radialGradient>

    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff5d0" stop-opacity="0.65"/>
      <stop offset="40%"  stop-color="#ffc94d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffc94d" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="kirby" cx="38%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#ffe2eb"/>
      <stop offset="55%"  stop-color="#ff9bb6"/>
      <stop offset="100%" stop-color="#ff5e85"/>
    </radialGradient>

    <linearGradient id="eye" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2a3a78"/>
      <stop offset="55%"  stop-color="#0a1450"/>
      <stop offset="100%" stop-color="#020616"/>
    </linearGradient>

    <radialGradient id="foot" cx="50%" cy="32%" r="78%">
      <stop offset="0%"   stop-color="#ff4070"/>
      <stop offset="100%" stop-color="#a8082a"/>
    </radialGradient>

    <radialGradient id="mouth" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#ff3a72"/>
      <stop offset="100%" stop-color="#8e0e2c"/>
    </radialGradient>
  </defs>

  <!-- Red Smash background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Warm halo behind Kirby -->
  <circle cx="512" cy="500" r="460" fill="url(#halo)"/>

  <!-- Subtle Smash speed-line accents -->
  <g opacity="0.22" stroke="#fff5d0" stroke-linecap="round" fill="none">
    <line x1="512" y1="55"  x2="512" y2="95"  stroke-width="14"/>
    <line x1="970" y1="512" x2="930" y2="512" stroke-width="14"/>
    <line x1="54"  y1="512" x2="94"  y2="512" stroke-width="14"/>
    <line x1="512" y1="970" x2="512" y2="930" stroke-width="14"/>
    <line x1="840" y1="184" x2="810" y2="214" stroke-width="10"/>
    <line x1="184" y1="184" x2="214" y2="214" stroke-width="10"/>
    <line x1="840" y1="840" x2="810" y2="810" stroke-width="10"/>
    <line x1="184" y1="840" x2="214" y2="810" stroke-width="10"/>
  </g>

  <g transform="translate(512 512)">
    <!-- Feet (drawn first so the body overlaps their inner edge) -->
    <ellipse cx="-135" cy="252" rx="122" ry="74"
             fill="url(#foot)" stroke="#1a0a14" stroke-width="14"
             transform="rotate(-18 -135 252)"/>
    <ellipse cx="150" cy="268" rx="132" ry="76"
             fill="url(#foot)" stroke="#1a0a14" stroke-width="14"
             transform="rotate(18 150 268)"/>

    <!-- Arms -->
    <ellipse cx="-250" cy="60" rx="72" ry="94"
             fill="url(#kirby)" stroke="#1a0a14" stroke-width="14"
             transform="rotate(-28 -250 60)"/>
    <ellipse cx="268" cy="78" rx="80" ry="104"
             fill="url(#kirby)" stroke="#1a0a14" stroke-width="14"
             transform="rotate(28 268 78)"/>

    <!-- Main body -->
    <circle cx="0" cy="0" r="238"
            fill="url(#kirby)" stroke="#1a0a14" stroke-width="16"/>

    <!-- Soft top-left body highlight -->
    <ellipse cx="-78" cy="-105" rx="86" ry="56"
             fill="#fff0f5" opacity="0.45"/>

    <!-- Cheek blushes -->
    <ellipse cx="-112" cy="58" rx="40" ry="20" fill="#ff5a87" opacity="0.85"/>
    <ellipse cx="112"  cy="58" rx="40" ry="20" fill="#ff5a87" opacity="0.85"/>

    <!-- Left eye -->
    <ellipse cx="-72" cy="-28" rx="30" ry="64"
             fill="url(#eye)" stroke="#1a0a14" stroke-width="6"/>
    <ellipse cx="-74" cy="-52" rx="22" ry="32" fill="#5e9aff" opacity="0.55"/>
    <ellipse cx="-80" cy="-66" rx="13" ry="23" fill="#ffffff"/>
    <ellipse cx="-66" cy="22"  rx="9"  ry="15" fill="#ffffff" opacity="0.75"/>

    <!-- Right eye -->
    <ellipse cx="72" cy="-28" rx="30" ry="64"
             fill="url(#eye)" stroke="#1a0a14" stroke-width="6"/>
    <ellipse cx="70" cy="-52" rx="22" ry="32" fill="#5e9aff" opacity="0.55"/>
    <ellipse cx="64" cy="-66" rx="13" ry="23" fill="#ffffff"/>
    <ellipse cx="78" cy="22"  rx="9"  ry="15" fill="#ffffff" opacity="0.75"/>

    <!-- Open smiling mouth -->
    <ellipse cx="0" cy="72" rx="28" ry="20"
             fill="url(#mouth)" stroke="#1a0a14" stroke-width="8"/>
    <ellipse cx="0" cy="79" rx="15" ry="7" fill="#ff85a8"/>
  </g>
</svg>
