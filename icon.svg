<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Smash Pairing">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="90%">
      <stop offset="0%"   stop-color="#e8442e"/>
      <stop offset="55%"  stop-color="#a01818"/>
      <stop offset="100%" stop-color="#3a0606"/>
    </radialGradient>

    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff5d0" stop-opacity="0.75"/>
      <stop offset="40%"  stop-color="#ffc94d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffc94d" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="cross" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fffcef"/>
      <stop offset="55%"  stop-color="#f7e1a3"/>
      <stop offset="100%" stop-color="#c79336"/>
    </linearGradient>

    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Red gradient background, Smash Ultimate style -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Warm energy halo -->
  <circle cx="512" cy="500" r="460" fill="url(#halo)"/>

  <!-- Speed-line accents radiating from the cross -->
  <g transform="translate(512 512) rotate(-22)" opacity="0.35" stroke="#fff5d0" stroke-linecap="round" fill="none">
    <line x1="0"    y1="-475" x2="0"    y2="-435" stroke-width="14"/>
    <line x1="0"    y1="455"  x2="0"    y2="420"  stroke-width="14"/>
    <line x1="455"  y1="0"    x2="420"  y2="0"    stroke-width="14"/>
    <line x1="-465" y1="0"    x2="-430" y2="0"    stroke-width="14"/>
    <line x1="320"  y1="-320" x2="295"  y2="-295" stroke-width="10"/>
    <line x1="320"  y1="320"  x2="295"  y2="295"  stroke-width="10"/>
    <line x1="-320" y1="320"  x2="-295" y2="295"  stroke-width="10"/>
    <line x1="-320" y1="-320" x2="-295" y2="-295" stroke-width="10"/>
  </g>

  <!-- Drop shadow under the cross -->
  <g transform="translate(522 525) rotate(-22)" opacity="0.45">
    <path d="M 0,-410 L 40,-58 L 350,-34 L 58,0 L 350,34 L 40,58 L 0,388 L -40,58 L -350,34 L -58,0 L -350,-34 L -40,-58 Z"
          fill="#1a0404"/>
  </g>

  <!-- Main Smash-style cross-burst -->
  <g transform="translate(512 512) rotate(-22)">
    <path d="M 0,-410 L 40,-58 L 350,-34 L 58,0 L 350,34 L 40,58 L 0,388 L -40,58 L -350,34 L -58,0 L -350,-34 L -40,-58 Z"
          fill="url(#cross)" stroke="#1a0404" stroke-width="16" stroke-linejoin="round"/>

    <!-- Top-arm shine highlight -->
    <path d="M -22,-380 L 0,-410 L 22,-380 L 9,-135 L -9,-135 Z"
          fill="url(#shine)" opacity="0.6"/>

    <!-- Small inner sparkle -->
    <circle cx="-150" cy="-12" r="6" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>
