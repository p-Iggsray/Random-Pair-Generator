<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Tournament Pairing">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="85%">
      <stop offset="0%"  stop-color="#1f2438"/>
      <stop offset="55%" stop-color="#0f1218"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <linearGradient id="exp-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#c4dfff"/>
      <stop offset="55%"  stop-color="#4d9fff"/>
      <stop offset="100%" stop-color="#22579c"/>
    </linearGradient>
    <linearGradient id="inexp-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#0f7a55"/>
      <stop offset="45%"  stop-color="#2ee8a0"/>
      <stop offset="100%" stop-color="#c4ffe5"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#dce3f0"/>
      <stop offset="100%" stop-color="#8b96b0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="65%"  stop-color="#4d9fff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4d9fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <circle cx="512" cy="500" r="360" fill="url(#halo)"/>

  <g transform="translate(512 512) rotate(-22)">
    <polygon points="0,0 -55,-150 0,-360 55,-150"
             fill="url(#exp-grad)"   stroke="#05060a" stroke-width="6" stroke-linejoin="round"/>
    <polygon points="0,0 150,-55 360,0 150,55"
             fill="url(#silver)"     stroke="#05060a" stroke-width="6" stroke-linejoin="round"/>
    <polygon points="0,0 55,150 0,360 -55,150"
             fill="url(#inexp-grad)" stroke="#05060a" stroke-width="6" stroke-linejoin="round"/>
    <polygon points="0,0 -150,55 -360,0 -150,-55"
             fill="url(#silver)"     stroke="#05060a" stroke-width="6" stroke-linejoin="round"/>

    <circle cx="0" cy="0" r="42" fill="url(#silver)" stroke="#05060a" stroke-width="6"/>
    <circle cx="-12" cy="-12" r="14" fill="#ffffff" opacity="0.75"/>
  </g>
</svg>
